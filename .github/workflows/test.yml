name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.changes.outputs.source }}
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        fetch-depth: 0

    - name: Check for source code changes
      id: changes
      run: |
        if [ "${{ github.event_name }}" = "push" ]; then
          # For push events, check changes in the last commit
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
        else
          # For PR events, check changes against base branch
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
        fi

        echo "Changed files: $CHANGED_FILES"

        # Check if any Go source files, templates, or build files changed
        if echo "$CHANGED_FILES" | grep -E '\.(go|tmpl|yaml|yml|mod|sum)$|Makefile|Dockerfile'; then
          echo "source=true" >> $GITHUB_OUTPUT
          echo "Source code changes detected"
        else
          echo "source=false" >> $GITHUB_OUTPUT
          echo "No source code changes detected"
        fi
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: changes
    strategy:
      matrix:
        go-version: ['1.26.5']

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: ${{ matrix.go-version }}

    - name: Download dependencies
      run: go mod download

    - name: Run unit tests
      run: |
        go test -v -race -coverprofile=coverage.out ./...
        go tool cover -html=coverage.out -o coverage.html

    - name: Upload coverage reports
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        file: ./coverage.out
        fail_ci_if_error: false

    - name: Upload coverage artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: coverage-report-go${{ matrix.go-version }}
        path: coverage.html

  e2e-test:
    name: E2E Test
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: needs.changes.outputs.source == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: '1.26.5'

    - name: Build binary
      run: make build

    - name: Run E2E test
      run: |
        cd /tmp
        mkdir e2e-test && cd e2e-test

        # Test init command
        ${{ github.workspace }}/bin/xp-provider-gen init --domain=test.io --repo=github.com/test/provider-e2e

        # Verify generated files
        [ -f "Makefile" ] || (echo "Makefile not found" && exit 1)
        [ -f "go.mod" ] || (echo "go.mod not found" && exit 1)
        [ -f ".gitignore" ] || (echo ".gitignore not found" && exit 1)
        [ -d "apis" ] || (echo "apis directory not found" && exit 1)

        # Test create api command
        ${{ github.workspace }}/bin/xp-provider-gen create api --group=compute --version=v1alpha1 --kind=Instance

        # Verify API files
        [ -f "apis/compute/v1alpha1/instance_types.go" ] || (echo "instance_types.go not found" && exit 1)
        [ -f "internal/controller/instance/controller.go" ] || (echo "controller.go not found" && exit 1)

        echo "E2E test completed successfully"